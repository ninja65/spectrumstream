syntax = "proto2";
package Waters.Control.Message;

message AddressQuery
{
	enum ConnectionType { CONNECT = 0; BIND = 1; PUBLISH = 2; SUBSCRIBE = 3; REQUEST = 4; REPLY = 5; }

	required string service_name = 1;
	optional ConnectionType connection_type = 2 [default = CONNECT];
}

message ServicePortAddress
{
	required string service_name = 1;
	optional string socket_port_id = 2;
	optional string publish_port_id = 3;
	optional string reply_port_id = 4;
}

message Service
{
	optional string name = 1;
	optional int32 location = 2;
}

message ServiceList
{
	repeated Service services = 1;
}
